services:
  sonarqube_db:
    image: postgres:15-alpine
    container_name: water_cicd_sonarqube_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=${SONAR_DB_PASSWORD:-sonar_password_change_me}
      - POSTGRES_DB=sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    networks:
      - cicd_network

  sonarqube:
    image: sonarqube:26.3.0.120487-community
    container_name: water_cicd_sonarqube
    restart: unless-stopped
    depends_on:
      - sonarqube_db
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube_db:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=${SONAR_DB_PASSWORD:-sonar_password_change_me}
    ports:
      - "9000:9000"
    networks:
      - cicd_network
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

  jenkins:
    image: jenkins/jenkins:lts
    container_name: water_cicd_jenkins
    restart: unless-stopped
    user: root
    depends_on:
      - sonarqube
    ports:
      - "8081:8080"
      - "50000:50000"
    networks:
      - cicd_network
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    volumes:
      - jenkins_data:/var/jenkins_home:rw
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:v2.53.3
    container_name: water_cicd_prometheus
    restart: unless-stopped
    depends_on:
      - jenkins
    ports:
      - "9090:9090"
    networks:
      - cicd_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PROMETHEUS_SCRAPE_HOST=${PROMETHEUS_SCRAPE_HOST:-host.docker.internal:5001}
      - PROMETHEUS_API_PREFIX=${PROMETHEUS_API_PREFIX:-}
    volumes:
      - ./ops/tools/prometheus.template.yml:/etc/prometheus/prometheus.template.yml:ro
      - prometheus_data:/prometheus
    entrypoint: ["/bin/sh", "-c"]
    command: >
      API_PREFIX="$${PROMETHEUS_API_PREFIX:-}" &&
      sed -e "s#__SCRAPE_HOST__#$${PROMETHEUS_SCRAPE_HOST}#g" -e "s#__API_PREFIX__#$${API_PREFIX}#g"
      /etc/prometheus/prometheus.template.yml > /etc/prometheus/prometheus.yml &&
      /bin/prometheus
      --config.file=/etc/prometheus/prometheus.yml
      --storage.tsdb.path=/prometheus
      --web.enable-lifecycle

  grafana:
    image: grafana/grafana:11.3.1
    container_name: water_cicd_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    networks:
      - cicd_network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin_change_me}
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/microservices-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

networks:
  cicd_network:
    driver: bridge

volumes:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  jenkins_data:
  prometheus_data:
  grafana_data:
