services:
  redis:
    image: redis:alpine
    container_name: water_mgmt_redis
    ports:
      - "6379:6379"
    networks:
      - water_network

  redis_exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: water_mgmt_redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    ports:
      - "9121:9121"
    networks:
      - water_network

  db:
    image: postgres:13-alpine
    container_name: water_mgmt_db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db_init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - water_network

  db_seeder:
    build: ./backend
    container_name: water_mgmt_db_seeder
    env_file:
      - ./backend/.env
    environment:
      - AUTH_DATABASE_URL=postgresql://user:password@db:5432/auth_db
      - SUPPLIER_DATABASE_URL=postgresql://user:password@db:5432/supplier_db
      - BOOKING_DATABASE_URL=postgresql://user:password@db:5432/booking_db
      - GAMIFICATION_DATABASE_URL=postgresql://user:password@db:5432/gamification_db
      - IOT_DATABASE_URL=postgresql://user:password@db:5432/iot_db
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-internal-dev-token}
    command: python populate_db.py
    volumes:
      - ./data:/data
    depends_on:
      - db
    networks:
      - water_network
    profiles:
      - tools

  auth_service:
    build: ./backend/auth_service
    container_name: water_auth_service
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/auth_db
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-internal-dev-token}
    depends_on:
      - db
    networks:
      - water_network

  supplier_service:
    build: ./backend/supplier_service
    container_name: water_supplier_service
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/supplier_db
      - REDIS_URL=redis://redis:6379/0
      - AUTH_SERVICE_URL=http://auth_service:5000
      - BOOKING_SERVICE_URL=http://booking_service:5000
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-internal-dev-token}
    depends_on:
      - db
      - redis
      - auth_service
    networks:
      - water_network

  booking_service:
    build: ./backend/booking_service
    container_name: water_booking_service
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/booking_db
      - AUTH_SERVICE_URL=http://auth_service:5000
      - SUPPLIER_SERVICE_URL=http://supplier_service:5000
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-internal-dev-token}
    depends_on:
      - db
      - auth_service
      - supplier_service
    networks:
      - water_network

  gamification_service:
    build: ./backend/gamification_service
    container_name: water_gamification_service
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/gamification_db
      - AUTH_SERVICE_URL=http://auth_service:5000
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-internal-dev-token}
    depends_on:
      - db
      - auth_service
    networks:
      - water_network

  iot_analytics_service:
    build: ./backend/iot_analytics_service
    container_name: water_iot_analytics_service
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/iot_db
      - AUTH_SERVICE_URL=http://auth_service:5000
      - BOOKING_SERVICE_URL=http://booking_service:5000
      - GAMIFICATION_SERVICE_URL=http://gamification_service:5000
      - SUPPLIER_SERVICE_URL=http://supplier_service:5000
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-internal-dev-token}
    depends_on:
      - db
      - auth_service
      - booking_service
      - gamification_service
      - supplier_service
    networks:
      - water_network

  api_gateway:
    build: ./backend/api_gateway
    container_name: water_api_gateway
    restart: always
    environment:
      - AUTH_SERVICE_HOST=auth_service
      - SUPPLIER_SERVICE_HOST=supplier_service
      - BOOKING_SERVICE_HOST=booking_service
      - GAMIFICATION_SERVICE_HOST=gamification_service
      - IOT_ANALYTICS_SERVICE_HOST=iot_analytics_service
    depends_on:
      - auth_service
      - supplier_service
      - booking_service
      - gamification_service
      - iot_analytics_service
    ports:
      - "5001:80"
    networks:
      - water_network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5001
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-pk_test_change_me}
    container_name: water_mgmt_frontend
    restart: always
    depends_on:
      - api_gateway
    ports:
      - "5173:80"
    networks:
      - water_network

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark_master
    volumes:
      - ./spark_libs:/opt/spark/jars_external
      - ./analytics:/opt/analytics
      - ./data:/opt/analytics/data
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_JDBC_URL=jdbc:postgresql://db:5432/iot_db
      - DB_USER=user
      - DB_PASS=password
    networks:
      - water_network

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark_worker
    volumes:
      - ./spark_libs:/opt/spark/jars_external
      - ./data:/opt/analytics/data
      - ./analytics:/opt/analytics
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    depends_on:
      - spark-master
    environment:
      - SPARK_JDBC_URL=jdbc:postgresql://db:5432/iot_db
      - DB_USER=user
      - DB_PASS=password
    networks:
      - water_network

  prometheus:
    image: prom/prometheus:latest
    container_name: water_mgmt_prometheus
    depends_on:
      - redis_exporter
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - water_network

  grafana:
    image: grafana/grafana:latest
    container_name: water_mgmt_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/microservices-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - water_network

networks:
  water_network:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:
